name: AirLine
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  AirLine:
    type: application
    platform: iOS
    sources:
      - path: AirLine
      - path: Shared
    info:
      path: AirLine/Info.plist
      properties:
        CFBundleDisplayName: AirLine
        NSSupportsLiveActivities: true
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.airline.focus
    dependencies:
      - target: AirLineWidget
        embed: true
  AirLineWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: AirLineWidget
      - path: Shared
    info:
      path: AirLineWidget/Info.plist
      properties:
        CFBundleDisplayName: AirLine
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.airline.focus.widget
        SKIP_INSTALL: true
